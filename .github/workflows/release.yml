name: Release

# 推送形如 v0.1.0 的标签时触发，自动在三平台构建并生成草稿 Release。
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest    # Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest    # Intel (x64)
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'z-switch ${{ github.ref_name }}'
          releaseBody: |
            ## z-switch ${{ github.ref_name }}

            下载对应平台的安装包：
            - **Windows**：`.exe`（NSIS 安装器）
            - **macOS**：`.dmg`（区分 Apple Silicon / Intel）
            - **Linux**：`.AppImage` / `.deb`

            > 首个版本未做代码签名，Windows SmartScreen 或 macOS Gatekeeper 可能提示未知来源，属正常现象。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
